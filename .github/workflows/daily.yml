name: Daily collection

# Runs the Python collectors directly (ninja → build → scraper → curate → report) on a
# schedule, writes to Neon, and commits the day's report. This is the heavy job that does
# NOT fit a serverless function's time limit, so it lives here, not on Vercel.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   NEON_DATABASE_URL, GLM_API_KEY, EMBEDDINGS_API_KEY, YOUTUBE_API_KEY, NINJA_ACCOUNT
# Optional: POE2_LEAGUE / NINJA_CHARACTER (otherwise the config.py defaults are used).

on:
  schedule:
    - cron: "23 2 * * *"  # 02:23 UTC daily — early + off-peak minute to cut the Actions queue delay; the nightly agent runs later and reads this fresh data
  workflow_dispatch:       # manual "Run workflow" button

permissions:
  contents: write          # to commit the daily report

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Apply DB migrations
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m db.connection migrate  # idempotent (IF NOT EXISTS); picks up new *.sql
      - name: Run daily collection
        env:
          # Real secrets. Everything else (GLM base/model, league, ninja paths) uses the
          # defaults in collector/config.py — only set these as secrets to override.
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          EMBEDDINGS_API_KEY: ${{ secrets.EMBEDDINGS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          NINJA_ACCOUNT: ${{ secrets.NINJA_ACCOUNT }}
          # Pin the tracked character (public name, not a secret). Without this the snapshot
          # follows whatever char is "current" on the ninja profile and drifts when a new char
          # is rolled. Change here to re-point it.
          NINJA_CHARACTER: YukinariSugawara
          OBSIDIAN_VAULT_DIR: reports
        run: python -m collector.run_daily
      - name: Commit daily report
        run: |
          git config user.name "wraeclast-bot"
          git config user.email "actions@users.noreply.github.com"
          git add reports/ || true
          git diff --cached --quiet && { echo "no report changes"; exit 0; }
          git commit -m "chore: daily report $(date -u +%F)"
          # rebase + retry so the report isn't silently lost on a non-fast-forward (main moved
          # while collection ran). Warn (don't fail the whole run) only if it truly can't push.
          for i in 1 2 3; do
            git pull --rebase --autostash origin main && git push origin HEAD:main && exit 0
            echo "push attempt $i failed, retrying…"; sleep 5
          done
          echo "::warning::could not push the daily report after 3 attempts"
