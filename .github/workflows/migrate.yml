name: Apply DB migrations

# Apply Neon migrations the moment a migration lands on main — NOT only on the nightly
# collection. Without this there is a window where a freshly-deployed API references tables a
# migration hasn't created yet (the /craft/* 500s on 2026-06-21 were exactly this gap).
# Idempotent (every migration uses IF NOT EXISTS), so re-runs are safe.

on:
  push:
    branches: [main]
    paths: ["db/migrations/**"]
  workflow_dispatch: # manual "Run workflow" button

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Apply migrations
        env:
          NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
        run: python -m db.connection migrate
