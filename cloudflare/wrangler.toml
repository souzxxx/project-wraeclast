name = "wraeclast-cron"
main = "worker.js"
compatibility_date = "2026-06-01"

# Daily at 04:00 UTC — after the league's economy snapshot settles, low-traffic window.
[triggers]
crons = ["0 4 * * *"]

# Set BACKEND_URL and INTERNAL_RUN_TOKEN as secrets, NOT here:
#   wrangler secret put BACKEND_URL
#   wrangler secret put INTERNAL_RUN_TOKEN
